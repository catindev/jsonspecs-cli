name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: jsonspecs-cli
    steps:
      - name: Checkout jsonspecs-cli
        uses: actions/checkout@v6
        with:
          path: jsonspecs-cli
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: Use npm with trusted publishing support
        run: npm install --global npm@11.18.0
      - name: Verify tag and package version
        run: node scripts/verify-release-tag.js "$GITHUB_REF_NAME"
      - name: Materialize the published jsonspecs dependency
        run: node scripts/materialize-jsonspecs.js ../jsonspecs
      - name: Install exact source dependencies
        run: npm ci
      - name: Verify source and packed consumer
        run: npm run verify
      - name: Build publishable tarball
        run: npm run pack:release -- --output "$RUNNER_TEMP/release"
      - name: Publish npm package
        run: npm publish "$RUNNER_TEMP/release/jsonspecs-cli-${GITHUB_REF_NAME#v}.tgz" --access public --tag latest
      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes "$RUNNER_TEMP/release/jsonspecs-cli-${GITHUB_REF_NAME#v}.tgz"
        env:
          GH_TOKEN: ${{ github.token }}
